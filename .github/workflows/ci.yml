name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build package
        run: pip install -e .

      - name: Run tests
        run: pytest

      - name: Generate project tree
        run: python scripts/tree.py > TREE.md

      - name: Upload TREE.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-tree
          path: TREE.md
